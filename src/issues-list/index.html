<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>简易 Vue3（ref + 模板更新）</title>
</head>

<body>
  <!-- 模板容器：类似 Vue 的 <template> -->
  <div id="app">
    <h1>计数：{{ count }}</h1>
    <p>双倍计数：{{ doubleCount }}</p>
    <p>{{ num }}</p>
    <!-- 修复：通过 appContext 访问 count（全局可访问 appContext） -->
    <button onclick="appContext.count.value++">点击加 1</button>
  </div>

  <script>
    // ========================= 1. 核心：依赖收集与副作用系统 =========================
    let activeEffect = null; // 当前活跃的副作用函数
    const targetMap = new WeakMap(); // 副作用桶：Target → Map(Key → Set(Effect))

    function effect(fn) {
      const effectFn = () => {
        cleanup(effectFn);
        activeEffect = effectFn;
        fn();
        activeEffect = null;
      };
      effectFn.deps = [];
      effectFn();
      return effectFn;
    }

    function cleanup(effectFn) {
      for (let deps of effectFn.deps) {
        deps.delete(effectFn);
      }
      effectFn.deps.length = 0;
    }

    function track(target, key) {
      if (!activeEffect) return;
      let depsMap = targetMap.get(target);
      if (!depsMap) targetMap.set(target, (depsMap = new Map()));
      let deps = depsMap.get(key);
      if (!deps) depsMap.set(key, (deps = new Set()));
      deps.add(activeEffect);
      activeEffect.deps.push(deps);
    }

    function trigger(target, key) {
      const depsMap = targetMap.get(target);
      if (!depsMap) return;
      const deps = depsMap.get(key);
      if (deps) {
        const effectsToRun = new Set(deps);
        effectsToRun.forEach(effectFn => effectFn());
      }
    }

    // ========================= 2. 实现 ref 响应式 =========================
    function ref(value) {
      const refObject = {
        get value() {
          track(refObject, 'value');
          return value;
        },
        set value(newVal) {
          if (newVal === value) return;
          value = newVal;
          trigger(refObject, 'value');
        }
      };
      return refObject;
    }

    // ========================= 3. 模板编译与渲染（关键修复） =========================
    function compile(template) {
      // 修复：替换为 context.变量名.value（明确上下文，避免 with 解析问题）
      const renderStr = template.replace(/\{\{ (.*?) \}\}/g, (_, key) => {
        return `\${context.${key}.value}`; // 直接拼接 context，无需 with
      });
      // 渲染函数接收 context 参数，直接使用
      return function render(context) {
        return eval(`\`${renderStr}\``); // 此时 context 是传入的参数，可正常访问
      };
    }

    function createApp(options) {
      const el = document.querySelector(options.el);
      const context = options.data();
      const template = el.innerHTML;
      const render = compile(template);

      // effect 包装渲染函数，确保依赖收集正常
      effect(() => {
        el.innerHTML = render(context);
      });

      return context;
    }

    // ========================= 4. 测试使用 =========================
    // 全局变量 appContext，供按钮 onclick 访问
    const appContext = createApp({
      el: '#app',
      data() {
        return {
          count: ref(0),
          doubleCount: ref(0),
          num: ref(88)
        };
      }
    });

    // 同步 doubleCount（通过 appContext 访问，稳定可靠）
    effect(() => {
      appContext.doubleCount.value = appContext.count.value * 2;
    });
  </script>
</body>

</html>
